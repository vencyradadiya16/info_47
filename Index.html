<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Interest Calculator </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <h2>Simple Interest Calculator</h2>
        <div class="input-group">
            <label>Principal Amount (P):</label>
            <input type="number" id="principal" placeholder="Enter amount">
        </div>
        <div class="input-group">
            <label>Interest Rate (R %):</label>
            <input type="number" id="rate" placeholder="Enter rate">
        </div>
        <div class="input-group">
            <label>Time in Years (N):</label>
            <input type="number" id="time" placeholder="Enter years">
        </div>
        <button id="calc-btn" onclick="calculateSI()">Calculate</button>
        <h3 id="result"></h3>
    </div>
    <script src="script.js"></script>
</body>
</html>
